<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ESP32 Masal Paneli</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        textarea { width: 100%; max-width: 600px; height: 200px; }
        .durum-kutusu { border: 1px solid #333; padding: 15px; width: 580px; background: #f9f9f9; }
    </style>
</head>
<body>

    <h1>ESP32 Masal Veri Paneli</h1>
    
    <textarea id="metinAlani" placeholder="Masal buraya gelecek..."></textarea>
    <br><br>
    
    <button onclick="masaliKaydet()">Masalı Veritabanına Kaydet</button>
    <button onclick="masaliOku()">Veritabanından Masalı Oku</button>
    <button onclick="masaliHazirla()">Örnek Masal Yükle</button>
    
    <h3>Son Durum:</h3>
    <div id="durum" class="durum-kutusu">Henüz işlem yapılmadı.</div>

    <script>
        const baseUrl = "https://diafon-tetik12-default-rtdb.europe-west1.firebasedatabase.app/Deneme1/Esp32_01/Durum.json";

        // Örnek Masalı Textarea'ya yükle
        function masaliHazirla() {
            const masal = "Bir zamanlar, uzak bir ülkenin en yüksek dağının zirvesinde Işık Avcısı adında minik bir kuş yaşarmış. Kanatlarının ucunda günün ilk ışıklarını yakalayıp, bunları ihtiyaç sahiplerine götürürmüş. Bir gün köyün çınarı kurumuş, Işık Avcısı kanatlarıyla onu tekrar canlandırmış. O günden beri ne zaman umutlar azalsa, Işık Avcısı gökyüzünde bir parıltı gibi belirecekmiş.";
            document.getElementById("metinAlani").value = masal;
        }

        // Yazıyı Firebase'e Gönder
        function masaliKaydet() {
            const yazi = document.getElementById("metinAlani").value;
            fetch(baseUrl + "?print=silent", {
                method: "PUT",
                body: JSON.stringify(yazi)
            })
            .then(() => {
                document.getElementById("durum").innerText = "Başarılı: Masal veritabanına kaydedildi.";
            })
            .catch(error => console.error("Hata:", error));
        }

        // Yazıyı Firebase'den Çek
        function masaliOku() {
            fetch(baseUrl)
                .then(response => response.json())
                .then(data => {
                    document.getElementById("metinAlani").value = data;
                    document.getElementById("durum").innerText = "Başarılı: Masal veritabanından çekildi.";
                })
                .catch(error => console.error("Hata:", error));
        }
    </script>
</body>
</html>
