<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ESP32 Kontrol Paneli</title>
</head>
<body>

<h1>ESP32 Durum Kontrolü</h1>

<div id="durum">Durum yükleniyor...</div>
<br>

<button onclick="durumDegistir(1)">Aktif Yap</button>
<button onclick="durumDegistir(0)">Pasif Yap</button>
<script>
    // URL'lerin aynı, sadece string olarak gönderiyoruz
    const readUrl = "https://diafon-tetik12-default-rtdb.europe-west1.firebasedatabase.app/Deneme1/Esp32_01/Durum.json";
    const writeUrl = "https://diafon-tetik12-default-rtdb.europe-west1.firebasedatabase.app/Deneme1/Esp32_01/Durum.json?print=silent";

    function durumuGoster() {
        fetch(readUrl)
            .then(response => response.json())
            .then(data => {
                // String kontrolü: Veri "Aktif" veya "Pasif" gelebilir
                document.getElementById("durum").innerText = "Güncel Durum: " + (data ? data : "Bilinmiyor");
            })
            .catch(error => console.error("Hata:", error));
    }

    function durumDegistir(yeniDurum) {
        // String gönderirken JSON.stringify düzgün tırnak ekler, sorunsuz çalışır
        fetch(writeUrl, {
            method: "PUT",
            body: JSON.stringify(yeniDurum) 
        })
        .then(() => {
            document.getElementById("durum").innerText = "Güncel Durum: " + yeniDurum;
        })
        .catch(error => console.error("Hata:", error));
    }

    durumuGoster();
</script>


</body>
</html>
